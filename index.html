/* ============================

:root {
  --bg: #1a1a2e;

  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --text-sub: #aab;
  --green: #4caf50;
  --yellow: #ffc107;
  --blue: #4a90d9;
  --orange: #ff9800;
  --border: #2a2a4a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, var(--accent2), #0a1628);
  padding: 20px 24px;
  border-bottom: 2px solid var(--accent);
}
.header h1 { font-size: 22px; font-weight: 700; }
.header .sub { color: var(--accent); font-size: 15px; margin-top: 2px; }
.header .update-info { color: var(--text-sub); font-size: 13px; margin-top: 4px; }

/* タブ */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab {
  padding: 14px 24px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-sub);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all .2s;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* パネル */
.panel { display: none; padding: 24px; }
.panel.active { display: block; }

/* カード共通 */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 16px;
  transition: background .2s;
}
.card:hover { background: var(--card-hover); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-title { font-weight: 700; font-size: 16px; }

/* バッジ */
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}
.badge-published { background: var(--green); color: #fff; }
.badge-draft { background: var(--yellow); color: #333; }
.badge-planned { background: var(--blue); color: #fff; }
.badge-idea { background: var(--orange); color: #fff; }
.badge-posted { background: var(--green); color: #fff; }
.badge-scheduled { background: var(--blue); color: #fff; }

/* タグ */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag {
  background: rgba(255,255,255,.08);
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text-sub);
}

/* カレンダー */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 12px;
}
.cal-header { font-size: 13px; text-align: center; color: var(--text-sub); font-weight: 600; padding: 6px 0; }
.cal-day {
  min-height: 68px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 7px;
  font-size: 13px;
}
.cal-day.today { border-color: var(--accent); background: rgba(233,69,96,.1); }
.cal-day .day-num { font-weight: 700; margin-bottom: 2px; }
.cal-day .event {
  font-size: 12px;
  padding: 1px 4px;
  border-radius: 3px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-day .event.note-ev { background: rgba(74,144,217,.3); color: #8bb8ea; }
.cal-day .event.x-ev { background: rgba(233,69,96,.3); color: #f0a0b0; }
.cal-empty { min-height: 68px; }

/* プロフィール */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
}
.stat-label { font-size: 13px; color: var(--text-sub); }
.stat-value { font-size: 20px; font-weight: 700; }

/* note本文プレビュー */

.copy-btn {

.cal-day .event.x-ev.posted { opacity: .4; text-decoration: line-through; }

/* 「コピーしてXを開く」メインボタン */
.copy-go-btn {
  background: #1da1f2;
  color: #fff;
  border: 1px solid #1da1f2;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  margin-top: 8px;
  transition: all .2s;

.copy-go-btn:hover { background: #1a91da; }

.copy-btn-small {
  background: transparent;
  color: var(--text-sub);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 6px;

  margin-top: 8px;

.copy-btn-small:hover { background: var(--accent2); color: var(--text); }

/* 手順ガイド */

.workflow-note {

@media (max-width: 600px) {

}

// ║  以下はレンダリングロジック — 基本的に編集不要              ║
// ╚══════════════════════════════════════════════════════════════╝

const D = DASHBOARD_DATA;

// ---- ユーティリティ ----
function fmt(dateStr) {
  if (!dateStr) return "未定";
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function statusBadge(s) {
  const m = { published: "公開済み", draft: "下書き", planned: "予定", idea: "アイデア", posted: "投稿済み", scheduled: "予約済み" };
  return `<span class="badge badge-${s}">${m[s]||s}</span>`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
// エスケープ済みのHTMLの中からURLを検出してアンカーに変換
function linkify(html) {
  return html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#4a90d9;text-decoration:underline;word-break:break-all;">$1</a>');
}

// ---- X投稿ステータスの永続化（localStorage） ----
// ユーザーがワンクリックで「投稿済み」に切り替えた結果をブラウザに保存。
// 次回リロードしても状態が保持される。Claudeを呼ばずに自分で更新できる仕組み。
const X_POSTS_OVERRIDES_KEY = 'haruDashboard_xPostsOverrides_v1';
function loadXPostsOverrides() {
  try { return JSON.parse(localStorage.getItem(X_POSTS_OVERRIDES_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveXPostsOverrides(obj) {
  try { localStorage.setItem(X_POSTS_OVERRIDES_KEY, JSON.stringify(obj)); } catch(e) {}
}
function applyXPostsOverrides() {
  const overrides = loadXPostsOverrides();
  D.xPosts.forEach(p => {
    if (overrides[p.id] !== undefined) p.status = overrides[p.id];
  });
}
function toggleXPostStatus(id) {
  const post = D.xPosts.find(p => p.id === id);
  if (!post) return;
  const newStatus = post.status === 'posted' ? 'scheduled' : 'posted';
  post.status = newStatus;
  const overrides = loadXPostsOverrides();
  overrides[id] = newStatus;
  saveXPostsOverrides(overrides);
  renderXPosts();
  renderCalendar();
}

// ---- note記事パネル ----
function renderArticles() {
  const el = document.getElementById('panel-note');
  const drafts = D.articles.filter(a => a.status === 'draft' || a.status === 'planned');
  const ideas = D.articles.filter(a => a.status === 'idea');
  const published = D.articles.filter(a => a.status === 'published');

  let html = `<div class="section-title">📝 下書き・公開予定（${drafts.length}件）</div>`;
  drafts.sort((a,b) => (a.date||'9').localeCompare(b.date||'9')).forEach(a => {
    html += articleCard(a);
  });

  html += `<div class="section-title" style="margin-top:24px">💡 アイデア（${ideas.length}件）</div>`;
  ideas.forEach(a => {
    html += articleCard(a);
  });

  html += `<div class="section-title" style="margin-top:24px">📰 公開済み（${published.length}件）</div>`;
  published.sort((a,b) => b.date.localeCompare(a.date)).forEach(a => {
    html += articleCard(a);
  });
  el.innerHTML = html;
}

function articleCard(a) {
  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">記事${a.id <= 10 ? '⓪①②③④⑤⑥⑦⑧⑨⑩'[a.id] : a.id} ${a.title}</span>
        ${statusBadge(a.status)}
      </div>
      <div style="font-size:14px;color:var(--text-sub);">
        ${a.date ? '📅 ' + fmt(a.date) + (a.status==='published'?' 公開':' 公開予定') : '📅 未定'}
      </div>
      <div style="font-size:14px;color:var(--text-sub);margin-top:6px;">${a.summary}</div>
      <div class="tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      ${a.noteUrl ? `<div style="margin-top:12px;"><a href="${a.noteUrl}" target="_blank" rel="noopener" class="article-link-btn">🔗 noteで記事を開く</a></div>` : ''}
      ${a.kindleUrl ? `<div style="margin-top:8px;"><a href="${a.kindleUrl}" target="_blank" rel="noopener" class="article-link-btn" style="background:#ff9900;border-color:#ff9900;">📕 Amazonで見る</a></div>` : (a.kindleUrl === '' && a.id === 12 ? '<div style="margin-top:8px;font-size:13px;color:var(--yellow);">⏳ Amazon承認待ち（72時間以内）— 承認後にURLを追記してください</div>' : '')}
    </div>`;
}

// ---- X投稿パネル ----
function renderXPosts() {
  const el = document.getElementById('panel-x');
  const scheduled = D.xPosts.filter(p => p.status === 'scheduled');
  const posted = D.xPosts.filter(p => p.status === 'posted');

  // 手順ガイド（常に先頭に表示）
  let html = `
    <div class="workflow-guide">
      <div class="workflow-title">📝 投稿の流れ（2ステップ・スマホ対応）</div>
      <div class="workflow-steps">
        <div class="wf-step"><span class="wf-num">1</span>「📱 Xに投稿（ワンタップ）」を押す → 投稿文入りのX画面が開く → 投稿ボタンを押すだけ</div>
        <div class="wf-step"><span class="wf-num">2</span>このページに戻って「✅ 投稿済みにする」を押す</div>
      </div>
      <div class="workflow-note">※ Xアプリがインストールされていればアプリが起動します。PCではWeb版が開きます。状態はこのブラウザに保存され、リロードしても保持されます。</div>
    </div>`;

  html += `<div class="section-title">📋 予約・投稿予定（${scheduled.length}件）</div>`;
  scheduled.sort((a,b) => a.date.localeCompare(b.date)).forEach(p => {
    html += xCard(p);
  });

  html += `<div class="section-title" style="margin-top:24px">📮 投稿済み（${posted.length}件）</div>`;
  posted.sort((a,b) => b.date.localeCompare(a.date)).forEach(p => {
    html += xCard(p);
  });

  // リセットボタン（一番下）
  html += `
    <div style="margin-top:32px;padding-top:16px;border-top:1px solid var(--border);text-align:center;">
      <button class="reset-btn" onclick="resetXPostsOverrides()" title="ブラウザに保存した投稿済み状態を全部クリアします。元のHTMLファイルのステータスに戻ります。">⚙️ 投稿済み状態をリセット</button>
    </div>`;
  el.innerHTML = html;
}

// ---- Xに投稿（Web Intent方式：ワンタップ投稿対応） ----
// スマホでも動作。URLに投稿文を埋め込んでX(アプリorWeb)の投稿画面を直接開く。
// 画像PCでもスマホでも同じ動き。クリップボードAPI不要なのでfile://でも動く。
function postToX(text) {
  // Web IntentのURL形式。Xアプリが入っていれば自動でアプリが起動する。
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  // バックアップでクリップボードにもコピー（失敗しても無視）
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {});
  }
  window.open(url, '_blank');
}

// ---- 状態リセット ----
function resetXPostsOverrides() {
  if (!confirm('ブラウザに保存した「投稿済み」状態を全部クリアします。よろしいですか？\n\n（HTMLファイル本来のステータスに戻ります。Claudeが更新した最新の状態を反映したいときに使ってください）')) return;
  localStorage.removeItem(X_POSTS_OVERRIDES_KEY);
  location.reload();
}

function xCard(p) {
  const linked = p.linkedArticle ? D.articles.find(a => a.id === p.linkedArticle) : null;
  return `
    <div class="card">
      <div class="card-header">
        <span style="font-size:14px;color:var(--text-sub);">📅 ${fmt(p.date)}</span>
        ${statusBadge(p.status)}
      </div>
      <div style="font-size:15px;white-space:pre-wrap;margin:10px 0;line-height:1.8;">${linkify(escHtml(p.text))}</div>
      ${linked ? `<div style="font-size:13px;color:var(--blue);margin-bottom:8px;">🔗 記事${linked.id}「${linked.title}」に連動</div>` : ''}
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        ${p.status === 'posted'
          ? `<button class="toggle-btn posted" onclick="toggleXPostStatus(${p.id})" title="クリックで予約済みに戻します">✅ 投稿済み</button>`
          : `<button class="copy-go-btn" onclick="postToX(decodeURIComponent('${encodeURIComponent(p.text)}'))" title="投稿文が入った状態でX(アプリ/Web)を開きます。スマホでもワンタップ投稿できます。">📱 Xに投稿（ワンタップ）</button>
             <button class="toggle-btn" onclick="toggleXPostStatus(${p.id})" title="X投稿が完了したらクリック">✅ 投稿済みにする</button>`
        }
        ${linked && linked.noteUrl ? `<a href="${linked.noteUrl}" target="_blank" rel="noopener" class="article-link-btn" style="margin-top:8px;">🔗 noteで記事を開く</a>` : ''}
        <button class="copy-btn-small" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(p.text)}')).then(()=>{this.textContent='✅';setTimeout(()=>this.textContent='📋 コピーのみ',2000);}).catch(e=>alert('コピー失敗: '+e))" title="Xを開かずテキストだけコピー">📋 コピーのみ</button>
      </div>
    </div>`;
}

// ---- カレンダーパネル ----
let calYear, calMonth;
function initCal() {
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth();
  renderCalendar();
}
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}
function renderCalendar() {
  const el = document.getElementById('panel-cal');
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const mm = String(calMonth+1).padStart(2,'0');
  const ym = `${calYear}-${mm}`;

  // イベント取得
  const events = {};
  D.articles.forEach(a => {
    if (a.date && a.date.startsWith(ym)) {
      const day = parseInt(a.date.split('-')[2]);
      if (!events[day]) events[day] = [];
      events[day].push({ type: 'note', label: `📝${a.title.substring(0,8)}`, title: a.title });
    }
  });
  D.xPosts.forEach(p => {
    if (p.date && p.date.startsWith(ym)) {
      const day = parseInt(p.date.split('-')[2]);
      if (!events[day]) events[day] = [];
      events[day].push({ type: 'x', label: '𝕏', title: p.text.split('\n')[0].substring(0,20), posted: p.status === 'posted' });
    }
  });

  let html = `
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">◀ 前月</button>
      <span class="cal-month-label">${calYear}年 ${calMonth+1}月</span>
      <button onclick="changeMonth(1)">翌月 ▶</button>
    </div>
    <div class="cal-grid">
      <div class="cal-header">日</div><div class="cal-header">月</div><div class="cal-header">火</div>
      <div class="cal-header">水</div><div class="cal-header">木</div><div class="cal-header">金</div><div class="cal-header">土</div>`;

  // 空セル
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    html += `<div class="cal-day${isToday ? ' today' : ''}">`;
    html += `<div class="day-num">${d}</div>`;
    if (events[d]) {
      events[d].forEach(ev => {
        const evClass = ev.type === 'note' ? 'note-ev' : ('x-ev' + (ev.posted ? ' posted' : ''));
        html += `<div class="event ${evClass}" title="${ev.title}${ev.posted ? ' (投稿済み)' : ''}">${ev.label}</div>`;
      });
    }
    html += `</div>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

// ---- タブ切替 ----
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabName));
}

  applyXPostsOverrides();
